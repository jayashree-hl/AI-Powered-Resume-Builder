<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ResumeAI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #06b6d4;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Geometric background */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.12), transparent 70%);
      top: -200px; right: -200px;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.10), transparent 70%);
      bottom: -100px; left: -100px;
    }
    .card {
      background: var(--card);
      width: 420px;
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: 0 20px 60px rgba(37,99,235,0.12), 0 4px 16px rgba(0,0,0,0.06);
      position: relative;
      z-index: 10;
      animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.30);
    }
    .brand-logo i { font-size: 28px; color: white; }
    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .brand p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* Flash messages */
    .flash { padding: 11px 16px; border-radius: 10px; font-size: 13.5px;
              margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .flash.success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .flash.danger  { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .flash.warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .flash.info    { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #f8faff;
      transition: all 0.2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.10);
    }
    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      font-size: 13px;
    }
    .row-options label { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
    .row-options a { color: var(--primary); text-decoration: none; }
    .row-options a:hover { text-decoration: underline; }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 11px;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    .divider {
      text-align: center;
      margin: 22px 0;
      position: relative;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      height: 1px;
      width: 42%;
      background: var(--border);
      top: 50%;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .social-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 22px;
    }
    .social-btn {
      flex: 1;
      padding: 11px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 15px;
      color: var(--muted);
      transition: all 0.2s;
    }
    .social-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0f4ff;
    }
    .footer-link {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }
    .footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo"><i class="fa-solid fa-file-lines"></i></div>
      <h1>Welcome Back</h1>
      <p>Sign in to your ResumeAI account</p>
    </div>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">
            <i class="fa-solid {% if category == 'success' %}fa-circle-check{% elif category == 'danger' %}fa-circle-xmark{% elif category == 'warning' %}fa-triangle-exclamation{% else %}fa-circle-info{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" name="email" placeholder="you@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>
      <div class="row-options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="divider">or continue with</div>
    <div class="social-row">
      <button class="social-btn" title="Google"><i class="fa-brands fa-google"></i></button>
      <button class="social-btn" title="GitHub"><i class="fa-brands fa-github"></i></button>
      <button class="social-btn" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></button>
    </div>

    <div class="footer-link">
      Don't have an account? <a href="/register">Create one free</a>
    </div>
  </div>
</body>
</html>
